<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Britto | Creative Designer</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      scroll-behavior: smooth;
    }

    header {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
    }

    header p {
      margin-top: 10px;
      color: #aaa;
    }

    section {
      padding: 80px 10%;
    }

    .portfolio {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.4s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .about, .contact {
      text-align: center;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid #fff;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <div>
    <h1>BRITTO</h1>
    <p>Creative Designer | Cinematic Visual Artist</p>
  </div>
</header>

<section>
  <h2>My Work</h2>
  <div class="portfolio">
    <div class="card"><img src="https://via.placeholder.com/400x500"></div>
    <div class="card"><img src="https://via.placeholder.com/400x500"></div>
    <div class="card"><img src="https://via.placeholder.com/400x500"></div>
  </div>
</section>

<section class="about">
  <h2>About Me</h2>
  <p>I create cinematic, high-quality visual designs including photo editing, posters, and spiritual-themed artwork.</p>
</section>

<section class="contact">
  <h2>Contact</h2>
  <a href="#" class="btn">WhatsApp Me</a>
</section>

<footer>
  <p>© 2026 Britto</p>
</footer>

</body>
</html>
